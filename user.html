<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel User - Antrian BPS Kota Solok</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <!-- Header -->
    <header class="bg-blue-700 text-white p-6 shadow-md flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold">Sistem Antrian PST</h1>
            <p class="text-sm text-blue-200">Badan Pusat Statistik Kota Solok</p>
        </div>
        <div class="text-right">
            <div id="clock" class="text-3xl font-bold tracking-wider">00:00:00</div>
            <div id="date" class="text-sm">Tanggal</div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white rounded-xl shadow-lg p-8 max-w-2xl w-full">
            <h2 class="text-xl font-semibold text-gray-800 mb-6 text-center">Ambil Nomor Antrian Anda</h2>
            
            <form id="queueForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                    <input type="text" id="nama" required class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Masukkan nama Anda">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">No. HP / WhatsApp</label>
                    <input type="tel" id="telepon" required class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Contoh: 08123456789">
                </div>
                
                <div class="pt-4">
                    <label class="block text-sm font-medium text-gray-700 mb-3 text-center">Pilih Layanan</label>
                    <div class="grid grid-cols-2 gap-4">
                        <button type="button" onclick="submitQueue('PST')" class="bg-blue-50 hover:bg-blue-600 hover:text-white text-blue-700 border border-blue-200 font-semibold py-4 rounded-xl transition-all shadow-sm">1. PST</button>
                        <button type="button" onclick="submitQueue('Pengaduan')" class="bg-green-50 hover:bg-green-600 hover:text-white text-green-700 border border-green-200 font-semibold py-4 rounded-xl transition-all shadow-sm">2. Pengaduan</button>
                        <button type="button" onclick="submitQueue('Konsul')" class="bg-purple-50 hover:bg-purple-600 hover:text-white text-purple-700 border border-purple-200 font-semibold py-4 rounded-xl transition-all shadow-sm">3. Layanan Konsul</button>
                        <button type="button" onclick="submitQueue('Prioritas')" class="bg-red-50 hover:bg-red-600 hover:text-white text-red-700 border border-red-200 font-semibold py-4 rounded-xl transition-all shadow-sm">4. Prioritas (Lansia/Disabilitas)</button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <script>
        // Real-time Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
            document.getElementById('date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Daily Reset Logic
        function checkDailyReset() {
            const today = new Date().toDateString();
            const storedDate = localStorage.getItem('queueDate');
            if (storedDate !== today) {
                localStorage.setItem('queueDate', today);
                localStorage.setItem('queues', JSON.stringify([]));
                localStorage.setItem('counters', JSON.stringify({ PST: 0, Pengaduan: 0, Konsul: 0, Prioritas: 0 }));
            }
        }

        function submitQueue(kategori) {
            const nama = document.getElementById('nama').value;
            const telepon = document.getElementById('telepon').value;

            if(!nama || !telepon) {
                alert('Mohon lengkapi Nama dan No HP terlebih dahulu.');
                return;
            }

            checkDailyReset();

            const prefixes = { PST: 'A', Pengaduan: 'B', Konsul: 'C', Prioritas: 'P' };
            let counters = JSON.parse(localStorage.getItem('counters'));
            counters[kategori]++;
            
            const noAntrian = `${prefixes[kategori]}-${String(counters[kategori]).padStart(3, '0')}`;
            
            let queues = JSON.parse(localStorage.getItem('queues'));
            queues.push({
                id: Date.now(),
                noAntrian: noAntrian,
                nama: nama,
                telepon: telepon,
                kategori: kategori,
                status: 'Menunggu',
                timestamp: new Date().toLocaleTimeString('id-ID')
            });

            localStorage.setItem('counters', JSON.stringify(counters));
            localStorage.setItem('queues', JSON.stringify(queues));

            alert(`Berhasil! Nomor Antrian Anda: ${noAntrian}\nSilakan tunggu panggilan.`);
            document.getElementById('queueForm').reset();
        }

        // Initialize on load
        if(!localStorage.getItem('queueDate')) checkDailyReset();
    </script>
</body>
</html>
