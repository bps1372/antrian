<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran - Antrian BPS Kota Solok</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <!-- Header -->
    <header class="bg-[#1d4ed8] text-white p-5 shadow-md flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold">Sistem Antrian PST</h1>
            <p class="text-sm text-blue-200">Badan Pusat Statistik Kota Solok</p>
        </div>
        <div class="text-right">
            <div id="clock" class="text-3xl font-bold tracking-wider">00.00.00</div>
            <div id="date" class="text-sm font-medium">Tanggal</div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center p-6 gap-8">
        
        <!-- Form Section -->
        <div class="bg-white rounded-xl shadow-md p-8 max-w-3xl w-full">
            <h2 class="text-xl font-bold text-gray-800 mb-6 text-center">Ambil Nomor Antrian Anda</h2>
            
            <form id="queueForm" class="space-y-5">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Nama Lengkap</label>
                    <input type="text" id="nama" required class="w-full border border-gray-300 rounded-lg p-3 text-gray-800 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" placeholder="Masukkan nama Anda">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">No. HP / WhatsApp</label>
                    <input type="tel" id="telepon" required class="w-full border border-gray-300 rounded-lg p-3 text-gray-800 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" placeholder="Contoh: 08123456789">
                </div>
                
                <div class="pt-4">
                    <label class="block text-sm text-gray-600 mb-3 text-center">Pilih Layanan</label>
                    <div class="grid grid-cols-2 gap-4">
                        <button type="button" onclick="submitQueue('PST')" class="bg-blue-50 hover:bg-blue-600 hover:text-white text-blue-700 border border-blue-200 font-semibold py-4 rounded-xl transition-all">1. PST</button>
                        <button type="button" onclick="submitQueue('Pengaduan')" class="bg-green-50 hover:bg-green-600 hover:text-white text-green-700 border border-green-200 font-semibold py-4 rounded-xl transition-all">2. Pengaduan</button>
                        <button type="button" onclick="submitQueue('Konsul')" class="bg-purple-50 hover:bg-purple-600 hover:text-white text-purple-700 border border-purple-200 font-semibold py-4 rounded-xl transition-all">3. Layanan Konsul</button>
                        <button type="button" onclick="submitQueue('Prioritas')" class="bg-red-50 hover:bg-red-600 hover:text-white text-red-700 border border-red-200 font-semibold py-4 rounded-xl transition-all">4. Prioritas (Lansia/Disabilitas)</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-xl shadow-md p-8 max-w-4xl w-full mb-10">
            <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Riwayat Antrian Hari Ini</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 text-sm border-b border-gray-200">
                            <th class="py-3 px-4 font-semibold">Waktu</th>
                            <th class="py-3 px-4 font-semibold">No. Antrian</th>
                            <th class="py-3 px-4 font-semibold">Layanan</th>
                            <th class="py-3 px-4 font-semibold">Nama</th>
                            <th class="py-3 px-4 font-semibold">WhatsApp</th>
                        </tr>
                    </thead>
                    <tbody id="queueTableBody" class="text-sm text-gray-700 divide-y divide-gray-100">
                        <!-- Data tabel akan masuk ke sini -->
                    </tbody>
                </table>
                <div id="emptyState" class="text-center py-6 text-gray-400 hidden">Belum ada antrian hari ini.</div>
            </div>
        </div>

    </main>

    <script>
        // Real-time Clock
        function updateClock() {
            const now = new Date();
            // Format waktu pakai titik sesuai gambar: 14.29.10
            const timeString = now.toLocaleTimeString('id-ID', { hour12: false }).replace(/:/g, '.');
            document.getElementById('clock').innerText = timeString;
            document.getElementById('date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Daily Reset Logic
        function checkDailyReset() {
            const today = new Date().toDateString();
            const storedDate = localStorage.getItem('queueDate');
            if (storedDate !== today) {
                localStorage.setItem('queueDate', today);
                localStorage.setItem('counters', JSON.stringify({ PST: 0, Pengaduan: 0, Konsul: 0, Prioritas: 0 }));
                localStorage.setItem('queueHistory', JSON.stringify([]));
                localStorage.removeItem('currentCall');
                localStorage.removeItem('activeLokets');
            }
        }

        // Tampilkan data di tabel
        function renderTable() {
            const history = JSON.parse(localStorage.getItem('queueHistory')) || [];
            const tbody = document.getElementById('queueTableBody');
            const emptyState = document.getElementById('emptyState');
            
            tbody.innerHTML = '';
            
            if(history.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                // Balik urutan agar yang terbaru muncul paling atas
                const reversedHistory = [...history].reverse(); 
                
                reversedHistory.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-blue-50 transition-colors";
                    
                    // Beri warna khusus jika Prioritas
                    const badgeColor = item.kategori === 'Prioritas' ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-700';
                    
                    tr.innerHTML = `
                        <td class="py-3 px-4">${item.timestamp}</td>
                        <td class="py-3 px-4 font-bold text-blue-700">${item.noAntrian}</td>
                        <td class="py-3 px-4"><span class="px-2 py-1 rounded text-xs font-semibold ${badgeColor}">${item.kategori}</span></td>
                        <td class="py-3 px-4 font-medium">${item.nama}</td>
                        <td class="py-3 px-4">${item.telepon}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        function submitQueue(kategori) {
            const nama = document.getElementById('nama').value.trim();
            const telepon = document.getElementById('telepon').value.trim();

            if(!nama || !telepon) {
                alert('Mohon isi Nama Lengkap dan No. HP/WhatsApp terlebih dahulu.');
                return;
            }

            checkDailyReset();

            const prefixes = { PST: 'A', Pengaduan: 'B', Konsul: 'C', Prioritas: 'P' };
            let counters = JSON.parse(localStorage.getItem('counters')) || { PST: 0, Pengaduan: 0, Konsul: 0, Prioritas: 0 };
            counters[kategori]++;
            
            const noAntrian = `${prefixes[kategori]}-${String(counters[kategori]).padStart(3, '0')}`;
            const timeNow = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            
            const newQueue = {
                noAntrian: noAntrian,
                nama: nama,
                telepon: telepon,
                kategori: kategori,
                timestamp: timeNow
            };

            // Update memori sistem
            localStorage.setItem('counters', JSON.stringify(counters));
            
            // Simpan ke riwayat tabel
            let history = JSON.parse(localStorage.getItem('queueHistory')) || [];
            history.push(newQueue);
            localStorage.setItem('queueHistory', JSON.stringify(history));

            // Set panggilan layar TV
            localStorage.setItem('currentCall', JSON.stringify(newQueue));

            let activeLokets = JSON.parse(localStorage.getItem('activeLokets')) || { PST: '-', Pengaduan: '-', Konsul: '-' };
            if(kategori === 'Prioritas') {
                activeLokets.PST = noAntrian; 
            } else {
                activeLokets[kategori] = noAntrian;
            }
            localStorage.setItem('activeLokets', JSON.stringify(activeLokets));

            // Perbarui UI
            renderTable();
            document.getElementById('queueForm').reset();
        }

        // Initialize on load
        checkDailyReset();
        renderTable();
        
        // Dengarkan perubahan jika ada modifikasi dari tab lain (opsional)
        window.addEventListener('storage', renderTable);
    </script>
</body>
</html>
