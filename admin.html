<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Antrian BPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-md overflow-hidden">
        <div class="bg-gray-800 p-4 text-white flex justify-between items-center">
            <h2 class="text-xl font-bold">Dashboard Admin Loket</h2>
            <button onclick="resetData()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-semibold">Reset Semua Data</button>
        </div>
        
        <div class="p-6">
            <h3 class="text-lg font-bold mb-4 text-gray-700">Daftar Tunggu (Sistem Prioritas Aktif)</h3>
            <div class="overflow-x-auto">
                <table class="min-w-full bg-white border border-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="py-3 px-4 text-left text-xs font-medium text-gray-500 uppercase">Nomor</th>
                            <th class="py-3 px-4 text-left text-xs font-medium text-gray-500 uppercase">Kategori</th>
                            <th class="py-3 px-4 text-left text-xs font-medium text-gray-500 uppercase">Nama</th>
                            <th class="py-3 px-4 text-left text-xs font-medium text-gray-500 uppercase">Waktu</th>
                            <th class="py-3 px-4 text-left text-xs font-medium text-gray-500 uppercase">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-200">
                        <!-- Data diisi oleh JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function loadQueues() {
            let queues = JSON.parse(localStorage.getItem('queues')) || [];
            
            // Filter hanya yang menunggu
            let waiting = queues.filter(q => q.status === 'Menunggu');
            
            // SORTING LOGIC: Prioritas diutamakan, sisanya berdasarkan waktu urut
            waiting.sort((a, b) => {
                if(a.kategori === 'Prioritas' && b.kategori !== 'Prioritas') return -1;
                if(b.kategori === 'Prioritas' && a.kategori !== 'Prioritas') return 1;
                return a.id - b.id; // Urut berdasarkan id (timestamp)
            });

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            waiting.forEach(q => {
                const tr = document.createElement('tr');
                const isPrioritas = q.kategori === 'Prioritas' ? 'bg-red-50 font-bold text-red-700' : '';
                
                tr.className = `hover:bg-gray-50 ${isPrioritas}`;
                tr.innerHTML = `
                    <td class="py-3 px-4">${q.noAntrian}</td>
                    <td class="py-3 px-4"><span class="px-2 py-1 bg-gray-200 rounded text-xs">${q.kategori}</span></td>
                    <td class="py-3 px-4">${q.nama} <br><span class="text-xs text-gray-500">${q.telepon}</span></td>
                    <td class="py-3 px-4 text-sm">${q.timestamp}</td>
                    <td class="py-3 px-4">
                        <button onclick="panggil('${q.id}')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow text-sm font-semibold transition-colors">
                            Panggil ke Loket
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function panggil(id) {
            let queues = JSON.parse(localStorage.getItem('queues'));
            const index = queues.findIndex(q => q.id == id);
            
            if(index !== -1) {
                queues[index].status = 'Dipanggil';
                const currentCall = queues[index];
                
                // Update active loket (Prioritas menimpa display loket mana saja, atau kita set default ke PST)
                let activeLokets = JSON.parse(localStorage.getItem('activeLokets')) || { PST: '-', Pengaduan: '-', Konsul: '-' };
                
                if(currentCall.kategori === 'Prioritas') {
                    // Masukkan ke layar loket pertama/PST sebagai prioritas
                    activeLokets.PST = currentCall.noAntrian; 
                } else {
                    activeLokets[currentCall.kategori] = currentCall.noAntrian;
                }

                localStorage.setItem('queues', JSON.stringify(queues));
                localStorage.setItem('currentCall', JSON.stringify(currentCall));
                localStorage.setItem('activeLokets', JSON.stringify(activeLokets));
                
                loadQueues();
            }
        }

        function resetData() {
            if(confirm('Yakin ingin mereset semua data antrian hari ini?')) {
                localStorage.setItem('queues', JSON.stringify([]));
                localStorage.setItem('counters', JSON.stringify({ PST: 0, Pengaduan: 0, Konsul: 0, Prioritas: 0 }));
                localStorage.removeItem('currentCall');
                localStorage.removeItem('activeLokets');
                loadQueues();
            }
        }

        // Auto update admin table if changes happen in user panel
        window.addEventListener('storage', loadQueues);
        loadQueues();
    </script>
</body>
</html>
